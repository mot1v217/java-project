<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title}">Закон Гука: имитация пружины</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="card">
      <h1>
        ⚡ <span th:text="${title}">закон Гука</span>
        <span>F = –k·Δx</span>
      </h1>
      <div class="sub" th:text="${description}">
        🔄 имитация колебаний пружины · тяните груз мышкой
      </div>

      <div class="canvas-wrapper">
        <canvas id="springCanvas" width="700" height="320"></canvas>
      </div>

      <div class="info-bar">
        <div class="force-badge">
          <div id="forceDisplay">сила упругости: 0.0 Н</div>
          <div id="displacementDisplay">смещение: 0.0 px</div>
        </div>
        <div class="legend">
          <span>равновесие</span>
          <span>текущее положение</span>
        </div>
      </div>

      <div class="control-panel">
        <div class="slider-group">
          <label>
            <span>🔧 жёсткость k</span>
            <span id="kValue">1.50</span>
          </label>
          <input
            type="range"
            id="kSlider"
            min="0.2"
            max="3.5"
            value="1.5"
            step="0.01"
          />
        </div>
        <div class="slider-group">
          <label>
            <span>⚖️ масса (инерция)</span>
            <span id="massValue">1.0</span>
          </label>
          <input
            type="range"
            id="massSlider"
            min="0.3"
            max="2.8"
            value="1.0"
            step="0.05"
          />
        </div>
        <div class="slider-group">
          <label>
            <span>💧 демпфирование</span>
            <span id="dampValue">0.14</span>
          </label>
          <input
            type="range"
            id="dampSlider"
            min="0.0"
            max="0.45"
            value="0.14"
            step="0.01"
          />
        </div>
      </div>

      <div class="hint">
        <i>⬅️ ➡️</i> перетащите груз — возникнет сила, стремящаяся вернуть его в
        равновесие (пунктир)
      </div>
      <footer>
        F = –k·x | текущее ускорение зависит от массы и демпфирования
      </footer>
    </div>
    <script th:src="@{/js/script.js}"></script>
  </body>
</html>
