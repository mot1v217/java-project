<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Закон Гука: имитация пружины</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, system-ui, sans-serif;
      }
      body {
        background: linear-gradient(145deg, #f5f7fc 0%, #e9ecf5 100%);
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(8px);
        border-radius: 3rem 2rem 3rem 2rem;
        box-shadow:
          0 25px 40px -10px rgba(10, 20, 50, 0.3),
          inset 2px 2px 5px rgba(255, 255, 255, 0.8),
          inset -3px -3px 8px rgba(0, 0, 0, 0.05);
        padding: 2rem 2rem 2.5rem 2rem;
        width: fit-content;
        max-width: 960px;
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      h1 {
        font-weight: 500;
        font-size: 2.4rem;
        letter-spacing: -0.5px;
        color: #1e2b3c;
        margin: 0 0 0.2rem 0;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      h1 span {
        background: #1e2b3c;
        color: #eef3fc;
        font-size: 1.2rem;
        padding: 0.2rem 1rem;
        border-radius: 40px;
        font-weight: 400;
      }
      .sub {
        color: #2c3e5c;
        font-size: 1.1rem;
        margin-bottom: 2rem;
        border-left: 5px solid #4a80e5;
        padding-left: 1rem;
        background: rgba(74, 128, 229, 0.1);
        border-radius: 0 20px 20px 0;
      }
      .canvas-wrapper {
        background: #d9e0ed;
        border-radius: 28px;
        padding: 20px 20px 10px 20px;
        box-shadow:
          inset 0 5px 10px rgba(0, 0, 0, 0.1),
          0 10px 15px rgba(52, 64, 84, 0.2);
      }
      canvas {
        display: block;
        width: 100%;
        height: auto;
        background: #f0f4fe;
        border-radius: 20px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        cursor: grab;
        touch-action: none; /* для удобства на мобильных */
      }
      canvas:active {
        cursor: grabbing;
      }
      .control-panel {
        margin-top: 2rem;
        display: flex;
        flex-wrap: wrap;
        gap: 2rem 3rem;
        align-items: flex-end;
        justify-content: center;
      }
      .slider-group {
        min-width: 200px;
        flex: 1 1 200px;
      }
      .slider-group label {
        display: flex;
        justify-content: space-between;
        font-weight: 600;
        color: #1f3a5f;
        letter-spacing: 0.3px;
        margin-bottom: 5px;
      }
      .slider-group label span:first-child {
        text-transform: uppercase;
        font-size: 0.9rem;
        opacity: 0.8;
      }
      .slider-group label span:last-child {
        background: #1e2f47;
        color: white;
        padding: 0.2rem 1rem;
        border-radius: 30px;
        font-size: 0.9rem;
      }
      input[type="range"] {
        width: 100%;
        height: 8px;
        background: linear-gradient(90deg, #3a6ab5, #8fc1ff);
        border-radius: 10px;
        -webkit-appearance: none;
        appearance: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 22px;
        height: 22px;
        background: white;
        border-radius: 50%;
        box-shadow: 0 4px 8px #1e3b5a;
        border: 2px solid #1e3b5a;
        cursor: pointer;
        transition: 0.07s;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        background: #e9f0ff;
      }
      .info-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem 3rem;
        justify-content: space-between;
        background: #ffffffc7;
        padding: 1rem 2rem;
        border-radius: 60px;
        margin: 1.5rem 0 0.5rem 0;
        backdrop-filter: blur(4px);
        border: 1px solid white;
        align-items: center;
      }
      .force-badge {
        display: flex;
        gap: 1.5rem;
        font-weight: 600;
      }
      .force-badge div {
        background: #1d344d;
        color: white;
        padding: 0.5rem 1.5rem;
        border-radius: 40px;
        box-shadow: inset 0 -2px 0 #a5c6ff;
      }
      .legend {
        display: flex;
        gap: 1.5rem;
        color: #2c405c;
      }
      .legend span::before {
        content: "●";
        margin-right: 8px;
        font-size: 1.2rem;
        vertical-align: middle;
        color: #4a80e5;
      }
      .legend span:last-child::before {
        color: #d44c2f;
      }
      .hint {
        text-align: center;
        font-size: 0.95rem;
        color: #3f4f6b;
        background: #dfe8fe;
        padding: 0.6rem 1.5rem;
        border-radius: 50px;
        margin-top: 1.2rem;
      }
      .hint i {
        font-style: normal;
        display: inline-block;
        background: #2b3f5e;
        color: white;
        padding: 0.2rem 1rem;
        border-radius: 30px;
        margin: 0 4px;
      }
      footer {
        margin-top: 1rem;
        color: #6b7a95;
        font-size: 0.9rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>
        ⚡ закон Гука
        <span>F = –k·Δx</span>
      </h1>
      <div class="sub">🔄 имитация колебаний пружины · тяните груз мышкой</div>

      <div class="canvas-wrapper">
        <canvas id="springCanvas" width="700" height="320"></canvas>
      </div>

      <div class="info-bar">
        <div class="force-badge">
          <div id="forceDisplay">сила упругости: 0.0 Н</div>
          <div id="displacementDisplay">смещение: 0.0 px</div>
        </div>
        <div class="legend">
          <span>равновесие</span>
          <span>текущее положение</span>
        </div>
      </div>

      <div class="control-panel">
        <div class="slider-group">
          <label>
            <span>🔧 жёсткость k</span>
            <span id="kValue">1.50</span>
          </label>
          <input
            type="range"
            id="kSlider"
            min="0.2"
            max="3.5"
            value="1.5"
            step="0.01"
          />
        </div>
        <div class="slider-group">
          <label>
            <span>⚖️ масса (инерция)</span>
            <span id="massValue">1.0</span>
          </label>
          <input
            type="range"
            id="massSlider"
            min="0.3"
            max="2.8"
            value="1.0"
            step="0.05"
          />
        </div>
        <div class="slider-group">
          <label>
            <span>💧 демпфирование</span>
            <span id="dampValue">0.14</span>
          </label>
          <input
            type="range"
            id="dampSlider"
            min="0.0"
            max="0.45"
            value="0.14"
            step="0.01"
          />
        </div>
      </div>

      <div class="hint">
        <i>⬅️ ➡️</i> перетащите груз — возникнет сила, стремящаяся вернуть его в
        равновесие (пунктир)
      </div>
      <footer>
        F = –k·x | текущее ускорение зависит от массы и демпфирования
      </footer>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("springCanvas");
        const ctx = canvas.getContext("2d");

        // фиксированные точки пружины
        const anchorX = 140; // точка подвеса (неподвижна)
        const equilibriumX = 400; // положение равновесия груза (центр масс)
        // ограничения движения груза
        const minMassX = 240;
        const maxMassX = 560;

        // Начальное положение груза – точно в равновесии
        let massX = equilibriumX;

        // физические переменные для инерционной имитации
        let velocity = 0; // скорость груза (пиксели/кадр)
        // параметры (будут обновляться из слайдеров)
        let stiffness = 1.5; // k
        let mass = 1.0; // m (условная)
        let damping = 0.14; // демпфирование

        // флаг перетаскивания
        let isDragging = false;

        // ---- привязка слайдеров ----
        const kSlider = document.getElementById("kSlider");
        const kSpan = document.getElementById("kValue");
        const massSlider = document.getElementById("massSlider");
        const massSpan = document.getElementById("massValue");
        const dampSlider = document.getElementById("dampSlider");
        const dampSpan = document.getElementById("dampValue");

        function updateSliders() {
          stiffness = parseFloat(kSlider.value);
          kSpan.textContent = stiffness.toFixed(2);

          mass = parseFloat(massSlider.value);
          massSpan.textContent = mass.toFixed(2);

          damping = parseFloat(dampSlider.value);
          dampSpan.textContent = damping.toFixed(2);
        }

        kSlider.addEventListener("input", updateSliders);
        massSlider.addEventListener("input", updateSliders);
        dampSlider.addEventListener("input", updateSliders);
        updateSliders(); // инициализация

        // ----- отображение силы и смещения -----
        const forceDisplay = document.getElementById("forceDisplay");
        const displacementDisplay = document.getElementById(
          "displacementDisplay",
        );

        function updateForceLabel() {
          const dx = massX - equilibriumX;
          const force = (-stiffness * dx).toFixed(1);
          forceDisplay.innerText = `сила упругости: ${force} Н`;
          displacementDisplay.innerText = `смещение: ${dx.toFixed(1)} px`;
        }

        // ----- рисование -----
        function drawSpring() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          // ---- фоновая пунктирная линия равновесия ----
          ctx.save();
          ctx.strokeStyle = "#4a80e5";
          ctx.lineWidth = 2.5;
          ctx.setLineDash([8, 8]);
          ctx.beginPath();
          ctx.moveTo(anchorX, 80);
          ctx.lineTo(equilibriumX, 200); // линия до равновесной позиции (просто визуальная)
          ctx.stroke();

          // вертикальная пунктирная метка равновесия
          ctx.beginPath();
          ctx.moveTo(equilibriumX, 150);
          ctx.lineTo(equilibriumX, 250);
          ctx.strokeStyle = "#4a80e5";
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.stroke();

          // опорная точка (потолок)
          ctx.beginPath();
          ctx.fillStyle = "#2b3f5e";
          ctx.shadowColor = "#a0b0c8";
          ctx.shadowBlur = 10;
          ctx.arc(anchorX, 80, 10, 0, 2 * Math.PI);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.shadowColor = "transparent";

          // короткая цепочка от потолка до начала пружины
          ctx.beginPath();
          ctx.strokeStyle = "#6b7f9f";
          ctx.lineWidth = 3;
          ctx.setLineDash([]);
          ctx.moveTo(anchorX, 80);
          ctx.lineTo(anchorX + 18, 120);
          ctx.stroke();

          // ---- пружина (ломаная линия) ----
          const startX = anchorX + 20;
          const startY = 122;
          const endX = massX - 18; // соединяем с грузом
          const endY = 200;

          ctx.beginPath();
          ctx.moveTo(startX, startY);

          // амплитуда зигзага
          const amp = 16;
          const segments = 10;
          const stepX = (endX - startX) / segments;
          const stepY = (endY - startY) / segments;

          for (let i = 1; i <= segments; i++) {
            const t = i / segments;
            const x = startX + stepX * i;
            // зигзаг по y (прямоугольная псевдо-пружина)
            const y =
              startY +
              stepY * i +
              (i % 2 === 0 ? amp : -amp) * Math.sin(t * Math.PI);
            ctx.lineTo(x, y);
          }
          ctx.lineTo(endX, endY);
          ctx.strokeStyle = "#3a4f70";
          ctx.lineWidth = 3.5;
          ctx.stroke();

          // ---- груз (прямоугольник) ----
          ctx.shadowBlur = 16;
          ctx.shadowColor = "#7f8fa0";
          ctx.fillStyle = "#d44c2f";
          ctx.beginPath();
          ctx.roundRect(massX - 22, 180, 44, 44, 10);
          ctx.fill();

          // дополнительная накладка
          ctx.fillStyle = "#b1361e";
          ctx.beginPath();
          ctx.roundRect(massX - 18, 184, 36, 36, 8);
          ctx.fill();

          // маленький блеск
          ctx.shadowBlur = 0;
          ctx.fillStyle = "#f9e0d0";
          ctx.beginPath();
          ctx.arc(massX - 4, 194, 5, 0, 2 * Math.PI);
          ctx.globalAlpha = 0.4;
          ctx.fill();
          ctx.globalAlpha = 1.0;

          // точка крепления пружины к грузу
          ctx.fillStyle = "#2b3f5e";
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(massX - 18, 200, 6, 0, 2 * Math.PI);
          ctx.fill();

          // ---- метка равновесия (пунктир) уже есть, добавим полупрозрачный круг ----
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = "#4a80e5";
          ctx.beginPath();
          ctx.arc(equilibriumX, 202, 12, 0, 2 * Math.PI);
          ctx.fill();
          ctx.globalAlpha = 1.0;

          // стрелочка силы (если не в равновесии и не перетаскиваем)
          if (Math.abs(massX - equilibriumX) > 2 && !isDragging) {
            ctx.beginPath();
            const direction = Math.sign(equilibriumX - massX); // направление к равновесию
            const arrowX = massX + direction * 35;
            ctx.moveTo(massX - 8, 160);
            ctx.lineTo(arrowX, 140);
            ctx.strokeStyle = "#e05a3a";
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            // треугольник
            ctx.fillStyle = "#e05a3a";
            ctx.beginPath();
            ctx.moveTo(arrowX, 140);
            ctx.lineTo(arrowX - direction * 12, 134);
            ctx.lineTo(arrowX - direction * 12, 146);
            ctx.closePath();
            ctx.fill();
          }
          ctx.setLineDash([]);
          ctx.shadowBlur = 0;
          ctx.restore();
        }

        // вспомогательный метод CanvasRenderingContext2D.roundRect
        CanvasRenderingContext2D.prototype.roundRect = function (
          x,
          y,
          w,
          h,
          r,
        ) {
          if (w < 2 * r) r = w / 2;
          if (h < 2 * r) r = h / 2;
          this.moveTo(x + r, y);
          this.lineTo(x + w - r, y);
          this.quadraticCurveTo(x + w, y, x + w, y + r);
          this.lineTo(x + w, y + h - r);
          this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          this.lineTo(x + r, y + h);
          this.quadraticCurveTo(x, y + h, x, y + h - r);
          this.lineTo(x, y + r);
          this.quadraticCurveTo(x, y, x + r, y);
          return this;
        };

        // ---- физическое обновление (когда не перетаскиваем) ----
        function updatePhysics() {
          if (isDragging) return; // при перетаскивании физика не меняет положение

          const dx = massX - equilibriumX; // смещение от равновесия
          const force = -stiffness * dx; // закон Гука
          const acceleration = force / (mass * 30); // масса влияет (множитель для визуальной плавности)
          velocity = velocity * (1 - damping * 0.1) + acceleration; // демпфирование
          massX += velocity;

          // мягкие границы (отбой)
          if (massX < minMassX) {
            massX = minMassX;
            velocity = -velocity * 0.4;
          } else if (massX > maxMassX) {
            massX = maxMassX;
            velocity = -velocity * 0.4;
          }

          // минимизация микродрейфа
          if (Math.abs(velocity) < 0.02 && Math.abs(dx) < 0.5) {
            massX = equilibriumX;
            velocity = 0;
          }
        }

        // ---- анимация ----
        function animate() {
          if (!isDragging) {
            updatePhysics();
            updateForceLabel();
          }
          drawSpring();
          requestAnimationFrame(animate);
        }
        animate();

        // ----- МЫШЬ: перетаскивание -----
        function getMouseCoord(e) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width; // соотношение логических пикселей canvas и CSS
          let clientX;
          if (e.touches) {
            clientX = e.touches[0].clientX;
            e.preventDefault();
          } else {
            clientX = e.clientX;
          }
          // вычисляем координату внутри canvas в пикселях canvas
          let canvasX = (clientX - rect.left) * scaleX;
          // ограничим диапазоном
          canvasX = Math.min(maxMassX, Math.max(minMassX, canvasX));
          return canvasX;
        }

        function startDrag(e) {
          e.preventDefault();
          const canvasX = getMouseCoord(e);
          // проверяем попадание в область груза (упрощённо)
          if (Math.abs(canvasX - massX) < 40) {
            isDragging = true;
            velocity = 0; // сбрасываем скорость
          }
        }

        function onDrag(e) {
          if (!isDragging) return;
          e.preventDefault();
          const canvasX = getMouseCoord(e);
          massX = canvasX;
          updateForceLabel();
        }

        function stopDrag(e) {
          if (isDragging) {
            isDragging = false;
            // небольшой толчок можно добавить при отпускании, но оставим как есть — пусть скорость с нуля
            velocity = 0; // можно убрать, чтобы была инерция, но аккуратнее: обнулим для предсказуемости
          }
        }

        canvas.addEventListener("mousedown", startDrag);
        window.addEventListener("mousemove", onDrag);
        window.addEventListener("mouseup", stopDrag);

        // тач-события (мобильные)
        canvas.addEventListener("touchstart", startDrag, { passive: false });
        window.addEventListener("touchmove", onDrag, { passive: false });
        window.addEventListener("touchend", stopDrag);
        window.addEventListener("touchcancel", stopDrag);

        // предотвращаем выделение при двойном ходе
        canvas.addEventListener("dragstart", (e) => e.preventDefault());
      })();
    </script>
  </body>
</html>
